      path: [agents.weather_agent, agents.restaurant_agent, agents.budget_agent]
  GEMINI_MODEL:
    type: env
    params:
      caller: [os.getenv]
      path: [agents.weather_agent, agents.restaurant_agent, agents.budget_agent]
  GOOGLE_API_KEY:
    type: env
    params:
      caller: [os.getenv]
      path: [agents.weather_agent, agents.restaurant_agent, agents.orchestrator, agents.budget_agent]
  ORCHESTRATOR_PORT:
    type: env
    params:
      caller: [os.getenv]
      path: [agents.orchestrator]
  RENDER_EXTERNAL_URL:
    type: env
    params:
      caller: [os.getenv]
      path: [agents.weather_agent, agents.restaurant_agent, agents.budget_agent]
  RESTAURANT_PORT:
    type: env
    params:
      caller: [os.getenv]
      path: [agents.restaurant_agent]
  WEATHER_PORT:
    type: env
    params:
      caller: [os.getenv]
      path: [agents.weather_agent]
